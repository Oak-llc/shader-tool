<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shader — Shader Tool</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/showcase.css" />
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script type="module">
    import { inject } from "https://esm.sh/@vercel/analytics";
    inject();
  </script>
</head>
<body>
<div id="app" class="showcase-app profile-app">

  <header id="topbar">
    <a id="logo" href="/">Shader<span>Tool</span></a>
    <nav class="topbar-nav">
      <a class="nav-link" href="/app">Editor</a>
      <a class="nav-link" href="/learn">Learn</a>
      <a class="nav-link" href="/showcase">Showcase</a>
    </nav>
    <div id="status-bar"></div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-icon" id="theme-toggle" title="Toggle light/dark mode">
        <iconify-icon icon="mingcute:moon-line" width="18" height="18"></iconify-icon>
      </button>
    </div>
  </header>

  <div id="profile-header">
    <h1 id="sv-title">Loading…</h1>
    <p id="sv-owner" style="color:var(--text-dim);font-size:13px"></p>
  </div>

  <div id="showcase-scroll">
    <div id="sv-canvas-wrap" style="max-width:900px;margin:0 auto">
      <canvas id="sv-canvas" style="width:100%;aspect-ratio:16/9;border-radius:var(--radius-lg);background:#000"></canvas>
      <div style="display:flex;gap:10px;margin-top:16px;justify-content:center">
        <button class="btn btn-primary" id="sv-remix-btn">Remix in Editor</button>
        <button class="btn btn-ghost" id="sv-like-btn">
          <iconify-icon icon="mingcute:heart-line" width="16" height="16"></iconify-icon>
          <span id="sv-like-count">0</span>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  (function () {
    var t = localStorage.getItem('shader-theme') || 'dark';
    if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    var a = localStorage.getItem('shader-accent');
    if (a && /^#[0-9a-f]{6}$/i.test(a)) document.documentElement.style.setProperty('--accent', a);
  })();
</script>
<script type="module" src="/js/shader-view.js"></script>
</body>
</html>
