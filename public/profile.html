<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Shader Tool</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/showcase.css" />
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script type="module">
    import { inject } from "https://esm.sh/@vercel/analytics";
    inject();
  </script>
</head>
<body>
<div id="app" class="showcase-app profile-app">

  <header id="topbar">
    <a id="logo" href="/">Shader<span>Tool</span></a>
    <nav class="topbar-nav">
      <a class="nav-link" href="/app">Editor</a>
      <a class="nav-link" href="/learn">Learn</a>
      <a class="nav-link" href="/showcase">Showcase</a>
    </nav>
    <div id="status-bar"></div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-icon" id="theme-toggle" title="Toggle light/dark mode">
        <iconify-icon icon="mingcute:moon-line" width="18" height="18"></iconify-icon>
      </button>
    </div>
  </header>

  <div id="profile-header">
    <h1 id="profile-username"></h1>
    <p id="profile-empty" hidden>No public shaders yet.</p>
  </div>

  <div id="showcase-scroll">
    <div id="showcase-grid"></div>
  </div>

  <!-- Maximize overlay -->
  <div id="sc-maximize">
    <div id="sc-maximize-bar">
      <button id="sc-back-btn">
        <iconify-icon icon="mingcute:arrow-left-line" width="14" height="14"></iconify-icon>
        Back
      </button>
      <div id="sc-maximize-title"></div>
      <button id="sc-open-btn">
        <span id="sc-open-btn-label">Remix in Editor</span>
        <iconify-icon icon="mingcute:arrow-right-line" width="14" height="14"></iconify-icon>
      </button>
    </div>
    <div id="sc-canvas-wrap">
      <canvas id="sc-max-canvas"></canvas>
      <div id="sc-info-overlay">
        <div id="sc-info-name"></div>
        <div id="sc-info-desc"></div>
      </div>
    </div>
  </div>

</div>

<script>
  (function () {
    var t = localStorage.getItem('shader-theme') || 'dark';
    if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    var a = localStorage.getItem('shader-accent');
    if (a && /^#[0-9a-f]{6}$/i.test(a)) document.documentElement.style.setProperty('--accent', a);
  })();
</script>
<script type="module" src="/js/profile.js"></script>
</body>
</html>
